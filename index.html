  spG.classed("dimmed",d=>d.group==="skill"&&d.category!==cat);

d3.select("#search").on("input",()=>{

  if(!q){reset();return;}

  nodes.forEach(d=>{if((d.name||"").toLowerCase().includes(q)||(d.desc||"").toLowerCase().includes(q)||(d.cat||"").toLowerCase().includes(q))ms.add(d.id);});

  linkG.classed("highlight",false);
