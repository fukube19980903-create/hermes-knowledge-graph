// Hexagon path generator
function hexPath(r) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const a = Math.PI / 3 * i - Math.PI / 6;
    pts.push([r * Math.cos(a), r * Math.sin(a)]);
  }
  return "M" + pts.map(p => p.join(",")).join("L") + "Z";
}

// Diamond path generator
function diamondPath(r) {
  return `M0,${-r} L${r},0 L0,${r} L${-r},0 Z`;
}

  const el = d3.select(this);
  if (d.group === "memory") {
    el.append("path").attr("d", diamondPath(d.size)).attr("fill", d.color).attr("stroke", "#0d1117").attr("stroke-width", 1.5).attr("opacity", 0.9);
  } else if (d.group === "knowledge") {
    el.append("path").attr("d", hexPath(d.size)).attr("fill", d.color).attr("stroke", "#0d1117").attr("stroke-width", 1.5).attr("opacity", 0.9);
  } else {
    el.append("circle").attr("r", d.size).attr("fill", d.color).attr("stroke", "#0d1117").attr("stroke-width", d.group==="user"?2.5:1).attr("opacity", d.group==="user"?1:0.8);
  }
  el.append("text").attr("dy", d.group === "user" || d.group === "meta" ? d.size + 13 : -d.size - 4).text(d.name);
});

// Hover
function showTooltip(e, d, extra) {
  tipName.text(d.name);
  tipCat.text(extra || d.desc ? (d.categoryName || d.group || "") : "");
  tipDesc.text(d.desc || "");
  tooltip.style("opacity", 1);
  const x = e.clientX + 15, y = e.clientY - 10;
  tooltip.style("left", (x + 380 > W ? x - 400 : x) + "px").style("top", y + "px");
}

specialG.on("mouseenter", (e, d) => {
  const extra = d.group === "skill" ? d.categoryName : (d.group === "memory" ? "💡 经验记忆" : d.group === "knowledge" ? "🧩 知识提炼" : d.group === "user" ? "👤 用户" : "📚 学习中心");
  showTooltip(e, d, extra);
}).on("mousemove", (e,d) => tooltip.style("left", (e.clientX+380>W?e.clientX-400:e.clientX+15)+"px").style("top",(e.clientY-10)+"px"))
  .on("mouseleave", () => tooltip.style("opacity", 0));

catG.on("mouseenter", (e, d) => {
  const cnt = nodes.filter(n => n.group === "skill" && n.category === d.cat).length;
  tipName.text(d.name); tipCat.text(`${cnt} 个技能`); tipDesc.text("双击展开 · 单击高亮 · 拖拽移动");
  tooltip.style("opacity", 1);
}).on("mousemove", e => tooltip.style("left",(e.clientX+15)+"px").style("top",(e.clientY-10)+"px"))
  .on("mouseleave", () => tooltip.style("opacity", 0))
  .on("dblclick", (e, d) => highlightCategory(d.cat));

// Tick
sim.on("tick", () => {
  linkG.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  catG.attr("transform", d => `translate(${d.x},${d.y})`);
  specialG.attr("transform", d => `translate(${d.x},${d.y})`);
});

// Highlight
function highlightCategory(cat) {
  specialG.classed("dimmed", d => d.group === "skill" && d.category !== cat);
  catG.classed("dimmed", d => d.cat !== cat);
  linkG.classed("dimmed", d => { const t = nodeMap.get(d.target.id||d.target); return !t || (t.group==="skill" && t.cat!==cat); });
  linkG.classed("highlight", d => { const t = nodeMap.get(d.target.id||d.target); return t && t.group==="skill" && t.cat===cat; });
  d3.select("#search").property("value", "");
}

function resetHighlight() {
  specialG.classed("dimmed", false); catG.classed("dimmed", false);
  linkG.classed("dimmed", false).classed("highlight", false);
  d3.select("#search").property("value", "");
}

// Search
d3.select("#search").on("input", () => {
  const q = d3.select("#search").property("value").toLowerCase().trim();
  if (!q) { resetHighlight(); return; }
  const matched = new Set();
  nodes.forEach(d => { if ((d.name||"").toLowerCase().includes(q) || (d.desc||"").includes(q) || (d.categoryName||"").includes(q)) matched.add(d.id); });
  specialG.classed("dimmed", d => !matched.has(d.id));
  catG.classed("dimmed", d => !nodes.filter(n => n.group==="skill" && n.category===d.cat).some(s => matched.has(s.id)));
  linkG.classed("dimmed", d => !matched.has(d.target.id||d.target));
});
</script>
</body>
</html>
